<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CYD / S3 Web Flasher</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://unpkg.com/esp-web-tools@10.1.0/dist/web/install-button.js?module"></script>
</head>
<body>
  <main class="container">
    <h1>ESP-IDF Web Flasher</h1>
    <p class="subtitle">Flash prebuilt CYD/S3 firmware from the browser.</p>

    <section class="card">
      <h2>1) Select Firmware</h2>
      <div class="row">
        <label>
          <input type="radio" name="variant" value="cyd" checked />
          CYD (ESP32 A2DP)
        </label>
        <label>
          <input type="radio" name="variant" value="s3" />
          S3 (ESP32-S3 SlimProto)
        </label>
      </div>
      <p id="variant-note" class="note"></p>
    </section>

    <section class="card">
      <h2>2) Flash Prebuilt Firmware</h2>
      <p class="note">This flashes the selected prebuilt image for your target.</p>
      <div id="cydPrebuiltOptions" class="cyd-only">
        <p class="note">CYD prebuilt profile:</p>
        <div class="row">
          <label>
            <input type="radio" name="cydPrebuilt" value="default" checked />
            Default
          </label>
          <label>
            <input type="radio" name="cydPrebuilt" value="touch-off" />
            Touch Disabled
          </label>
          <label>
            <input type="radio" name="cydPrebuilt" value="image-off" />
            Image Loading Disabled
          </label>
          <label>
            <input type="radio" name="cydPrebuilt" value="touch-image-off" />
            Touch + Image Disabled
          </label>
        </div>
      </div>

      <div class="grid cyd-only">
        <label>
          Bluetooth Device Name (CYD)
          <input id="deviceName" type="text" maxlength="31" placeholder="CYD Music Player" />
        </label>
      </div>

      <p id="btNameHelp" class="note cyd-only">If set, the CYD app binary is patched in-browser before flashing so the name is applied on boot.</p>
      <p id="firmwareStatus" class="note"></p>
      <esp-web-install-button id="installButton" manifest="manifest-cyd.json"></esp-web-install-button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
